<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espera Asignación de Rol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media (max-width: 576px) {
            .wait-card { padding: 1rem !important; }
            .wait-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center py-3" style="min-height: 100svh;">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-6">
                <div class="card shadow p-4 wait-card">
                    <h2 class="mb-4 wait-title">¡Bienvenido!</h2>
                    <p class="mb-4">Tu cuenta ha sido creada correctamente.<br>Por favor, espera a que un administrador asigne tu rol.<br>Vuelve a intentarlo más tarde.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
