<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Consultor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center g-4">
            <div class="col-lg-10">
                <div class="card shadow p-4 mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2 class="mb-0">Panel de Consultor</h2>
                        <button id="refresh-all" class="btn btn-outline-secondary btn-sm">Actualizar</button>
                    </div>
                    <div id="status" class="alert d-none" role="alert"></div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <div class="border rounded p-3 bg-white">
                                <div class="text-muted small">Ventas totales</div>
                                <div class="fs-4 fw-semibold" id="kpi-total-ventas">0</div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="border rounded p-3 bg-white">
                                <div class="text-muted small">Ingresos acumulados</div>
                                <div class="fs-4 fw-semibold" id="kpi-ingresos">$0.00</div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="border rounded p-3 bg-white">
                                <div class="text-muted small">Productos activos</div>
                                <div class="fs-4 fw-semibold" id="kpi-productos">0</div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="filtro-desde" class="form-label">Desde</label>
                            <input type="date" id="filtro-desde" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label for="filtro-hasta" class="form-label">Hasta</label>
                            <input type="date" id="filtro-hasta" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label for="filtro-texto" class="form-label">Buscar por ID usuario</label>
                            <input type="text" id="filtro-texto" class="form-control" placeholder="Ej: 67f...">
                        </div>
                    </div>
                    <div class="mt-3">
                        <button id="aplicar-filtros" class="btn btn-primary btn-sm">Aplicar filtros</button>
                        <button id="limpiar-filtros" class="btn btn-outline-secondary btn-sm">Limpiar</button>
                    </div>
                </div>

                <div class="card shadow p-4">
                    <h5 class="mb-3">Ventas registradas</h5>
                    <div class="table-responsive">
                        <table class="table table-striped" id="ventas-table">
                            <thead>
                                <tr>
                                    <th>ID Venta</th>
                                    <th>Fecha</th>
                                    <th>Usuario</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td colspan="4" class="text-center text-muted">Cargando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const statusBox = document.getElementById('status');
        const ventasTableBody = document.querySelector('#ventas-table tbody');
        const filtroDesde = document.getElementById('filtro-desde');
        const filtroHasta = document.getElementById('filtro-hasta');
        const filtroTexto = document.getElementById('filtro-texto');

        let ventasCache = [];

        function showStatus(message, type = 'success') {
            statusBox.className = `alert alert-${type}`;
            statusBox.textContent = message;
            statusBox.classList.remove('d-none');
        }

        function clearStatus() {
            statusBox.classList.add('d-none');
            statusBox.textContent = '';
        }

        function formatCurrency(value) {
            return Number(value || 0).toFixed(2);
        }

        async function fetchJson(url, options = {}) {
            const res = await fetch(url, {
                credentials: 'same-origin',
                ...options
            });

            let data = {};
            try {
                data = await res.json();
            } catch (_) {
                data = {};
            }

            if (!res.ok) {
                const message = data.error || data.message || 'Error en la solicitud';
                throw new Error(message);
            }

            return data;
        }

        function renderKpis(ventas, totalProductos) {
            const ingresos = ventas.reduce((sum, venta) => sum + Number(venta.total || 0), 0);
            document.getElementById('kpi-total-ventas').textContent = String(ventas.length);
            document.getElementById('kpi-ingresos').textContent = `$${formatCurrency(ingresos)}`;
            document.getElementById('kpi-productos').textContent = String(totalProductos);
        }

        function renderVentas(ventas) {
            if (!ventas.length) {
                ventasTableBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No hay ventas para mostrar</td></tr>';
                return;
            }

            ventasTableBody.innerHTML = ventas.map((venta) => `
                <tr>
                    <td>${venta.id}</td>
                    <td>${new Date(venta.fecha).toLocaleString()}</td>
                    <td>${venta.usuario_id || '-'}</td>
                    <td>$${formatCurrency(venta.total)}</td>
                </tr>
            `).join('');
        }

        function applyFilters() {
            const desde = filtroDesde.value ? new Date(`${filtroDesde.value}T00:00:00`) : null;
            const hasta = filtroHasta.value ? new Date(`${filtroHasta.value}T23:59:59`) : null;
            const texto = filtroTexto.value.trim().toLowerCase();

            const filtradas = ventasCache.filter((venta) => {
                const fechaVenta = new Date(venta.fecha);
                if (desde && fechaVenta < desde) return false;
                if (hasta && fechaVenta > hasta) return false;
                if (texto && !String(venta.usuario_id || '').toLowerCase().includes(texto)) return false;
                return true;
            });

            renderVentas(filtradas);
            const ingresosFiltrados = filtradas.reduce((sum, venta) => sum + Number(venta.total || 0), 0);
            document.getElementById('kpi-total-ventas').textContent = String(filtradas.length);
            document.getElementById('kpi-ingresos').textContent = `$${formatCurrency(ingresosFiltrados)}`;
        }

        function clearFilters() {
            filtroDesde.value = '';
            filtroHasta.value = '';
            filtroTexto.value = '';
            renderVentas(ventasCache);
            const ingresos = ventasCache.reduce((sum, venta) => sum + Number(venta.total || 0), 0);
            document.getElementById('kpi-total-ventas').textContent = String(ventasCache.length);
            document.getElementById('kpi-ingresos').textContent = `$${formatCurrency(ingresos)}`;
        }

        async function init() {
            try {
                clearStatus();
                const [ventasData, productosData] = await Promise.all([
                    fetchJson('/api/ventas'),
                    fetchJson('/api/productos')
                ]);

                ventasCache = ventasData.ventas || [];
                const totalProductos = (productosData.productos || []).length;

                renderKpis(ventasCache, totalProductos);
                renderVentas(ventasCache);
            } catch (error) {
                showStatus(error.message, 'danger');
                ventasTableBody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No se pudo cargar la información</td></tr>';
            }
        }

        document.getElementById('aplicar-filtros').addEventListener('click', applyFilters);
        document.getElementById('limpiar-filtros').addEventListener('click', clearFilters);
        document.getElementById('refresh-all').addEventListener('click', init);

        init();
    </script>
</body>
</html>
