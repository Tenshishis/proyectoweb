<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrar Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card shadow p-4">
                    <h2 class="mb-4">Administrar Usuarios</h2>
                    <div id="users-table"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    function authHeader() {
        const token = getCookie('token');
        return token ? { 'Authorization': 'Bearer ' + token } : {};
    }

    async function fetchUsers() {
        const res = await fetch('/api/admin/users', {
            headers: authHeader()
        });
        const data = await res.json();
        const users = data.users || data;
        let html = `<table class='table'><thead><tr><th>Nombre</th><th>Usuario</th><th>Email</th><th>Rol</th><th>Acciones</th></tr></thead><tbody>`;
        for (const user of users) {
            html += `<tr><td>${user.nombre || ''}</td><td>${user.username || ''}</td><td>${user.email || ''}</td><td>${user.rol || 'Sin rol'}</td>`;
            html += `<td><button onclick=\"assignRole('${user._id}','ADMIN')\" class='btn btn-sm btn-success me-1'>Admin</button>`;
            html += `<button onclick=\"assignRole('${user._id}','VENDEDOR')\" class='btn btn-sm btn-primary me-1'>Vendedor</button>`;
            html += `<button onclick=\"assignRole('${user._id}','CONSULTOR')\" class='btn btn-sm btn-warning me-1'>Consultor</button>`;
            html += `<button onclick=\"deleteUser('${user._id}')\" class='btn btn-sm btn-danger'>Eliminar</button></td></tr>`;
        }
        html += '</tbody></table>';
        document.getElementById('users-table').innerHTML = html;
    }
    async function assignRole(id, role) {
        await fetch(`/api/admin/asignar-rol`, {
            method: 'PUT',
            headers: { ...authHeader(), 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: id, nuevoRol: role })
        });
        fetchUsers();
    }
    async function deleteUser(id) {
        await fetch(`/api/admin/users/${id}`, {
            method: 'DELETE',
            headers: authHeader()
        });
        fetchUsers();
    }
    fetchUsers();
    </script>
</body>
</html>
