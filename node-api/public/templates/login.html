<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media (max-width: 576px) {
            .auth-card { padding: 1rem !important; }
            .auth-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center py-3" style="min-height: 100svh;">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-6 col-lg-5">
                <div class="card shadow p-4 auth-card">
                    <h2 class="mb-4 auth-title">Iniciar Sesión</h2>
                    <form method="POST" action="/login">
                        <input type="text" name="identifier" class="form-control mb-2" placeholder="Usuario o Email" required>
                        <input type="password" name="password" class="form-control mb-2" placeholder="Contraseña" required>
                        <button type="submit" class="btn btn-primary w-100">Entrar</button>
                    </form>
                    <a href="/register" class="btn btn-link mt-3">¿No tienes cuenta? Regístrate</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
