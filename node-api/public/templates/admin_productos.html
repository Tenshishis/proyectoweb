<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrar Stock de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card shadow p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="mb-0">Administrar Stock de Productos</h2>
                        <a href="/admin-redirect" class="btn btn-outline-secondary btn-sm">Volver</a>
                    </div>

                    <div id="status" class="alert d-none" role="alert"></div>

                    <div class="table-responsive">
                        <table class="table table-striped align-middle" id="productos-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Categoría</th>
                                    <th>Precio</th>
                                    <th>Stock actual</th>
                                    <th>Agregar stock</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td colspan="7" class="text-center text-muted">Cargando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tableBody = document.querySelector('#productos-table tbody');
        const statusBox = document.getElementById('status');

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        function authHeader() {
            const token = getCookie('token');
            return token ? { Authorization: 'Bearer ' + token } : {};
        }

        function showStatus(message, type = 'success') {
            statusBox.className = `alert alert-${type}`;
            statusBox.textContent = message;
            statusBox.classList.remove('d-none');
        }

        function clearStatus() {
            statusBox.classList.add('d-none');
            statusBox.textContent = '';
        }

        function formatCurrency(value) {
            return Number(value || 0).toFixed(2);
        }

        async function fetchJson(url, options = {}) {
            const res = await fetch(url, {
                headers: {
                    ...authHeader(),
                    ...(options.headers || {})
                },
                ...options
            });

            let data = {};
            try {
                data = await res.json();
            } catch (_) {
                data = {};
            }

            if (!res.ok) {
                const message = data.error || data.message || 'Error en la solicitud';
                throw new Error(message);
            }

            return data;
        }

        async function loadProductos() {
            const data = await fetchJson('/api/productos');
            const productos = data.productos || [];

            if (!productos.length) {
                tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No hay productos activos</td></tr>';
                return;
            }

            tableBody.innerHTML = productos.map((producto) => `
                <tr>
                    <td>${producto.id}</td>
                    <td>${producto.nombre}</td>
                    <td>${producto.categoria || 'General'}</td>
                    <td>$${formatCurrency(producto.precio)}</td>
                    <td><strong>${producto.stock}</strong></td>
                    <td style="max-width:140px;">
                        <input type="number" min="1" class="form-control form-control-sm" id="add-${producto.id}" value="1">
                    </td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="agregarStock(${producto.id})">Agregar</button>
                    </td>
                </tr>
            `).join('');
        }

        async function agregarStock(productoId) {
            clearStatus();
            const input = document.getElementById(`add-${productoId}`);
            const cantidad = Number(input ? input.value : 0);

            if (!Number.isInteger(cantidad) || cantidad <= 0) {
                showStatus('La cantidad debe ser un entero mayor que 0', 'warning');
                return;
            }

            try {
                await fetchJson(`/api/productos/${productoId}/stock`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cantidad })
                });

                showStatus('Stock actualizado correctamente', 'success');
                await loadProductos();
            } catch (error) {
                showStatus(error.message, 'danger');
            }
        }

        window.agregarStock = agregarStock;

        (async function init() {
            try {
                await loadProductos();
            } catch (error) {
                showStatus(error.message, 'danger');
                tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No se pudo cargar la información</td></tr>';
            }
        })();
    </script>
</body>
</html>
