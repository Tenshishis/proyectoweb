<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrar Stock de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media (max-width: 768px) {
            .panel-card { padding: 1rem !important; }
            .panel-title { font-size: 1.3rem; }
            .table { font-size: 0.9rem; }
            .action-buttons .btn { width: 100%; }
        }
    </style>
</head>
<body class="bg-light">
    <div class="container py-3 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-10">
                <div class="card shadow p-4 panel-card">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-4">
                        <h2 class="mb-0 panel-title">Administrar Stock de Productos</h2>
                        <a href="/admin-redirect" class="btn btn-outline-secondary btn-sm">Volver</a>
                    </div>

                    <div id="status" class="alert d-none" role="alert"></div>

                    <h5 class="mb-3">Agregar nuevo producto</h5>
                    <form id="nuevo-producto-form" class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label for="nuevo-nombre" class="form-label">Nombre</label>
                            <input type="text" id="nuevo-nombre" class="form-control" required>
                        </div>
                        <div class="col-md-2">
                            <label for="nuevo-precio" class="form-label">Precio</label>
                            <input type="number" id="nuevo-precio" class="form-control" min="1" step="0.01" required>
                        </div>
                        <div class="col-md-2">
                            <label for="nuevo-stock" class="form-label">Stock inicial</label>
                            <input type="number" id="nuevo-stock" class="form-control" min="0" step="1" required>
                        </div>
                        <div class="col-md-4">
                            <label for="nuevo-descripcion" class="form-label">Descripción</label>
                            <input type="text" id="nuevo-descripcion" class="form-control" placeholder="Opcional">
                        </div>
                        <div class="col-12 d-grid d-md-block">
                            <button type="submit" class="btn btn-success btn-sm">Crear producto</button>
                        </div>
                    </form>

                    <h5 class="mb-3">Productos activos</h5>
                    <div class="table-responsive mb-4">
                        <table class="table table-striped align-middle" id="productos-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Categoría</th>
                                    <th>Precio</th>
                                    <th>Stock actual</th>
                                    <th>Agregar stock</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td colspan="7" class="text-center text-muted">Cargando...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <h5 class="mb-3">Productos inactivos</h5>
                    <div class="table-responsive">
                        <table class="table table-striped align-middle" id="productos-inactivos-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Categoría</th>
                                    <th>Precio</th>
                                    <th>Stock actual</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td colspan="6" class="text-center text-muted">Cargando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tableBody = document.querySelector('#productos-table tbody');
        const inactiveTableBody = document.querySelector('#productos-inactivos-table tbody');
        const statusBox = document.getElementById('status');
        const nuevoProductoForm = document.getElementById('nuevo-producto-form');

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        function authHeader() {
            const token = getCookie('token');
            return token ? { Authorization: 'Bearer ' + token } : {};
        }

        function showStatus(message, type = 'success') {
            statusBox.className = `alert alert-${type}`;
            statusBox.textContent = message;
            statusBox.classList.remove('d-none');
        }

        function clearStatus() {
            statusBox.classList.add('d-none');
            statusBox.textContent = '';
        }

        function formatCurrency(value) {
            return Number(value || 0).toFixed(2);
        }

        async function fetchJson(url, options = {}) {
            const res = await fetch(url, {
                headers: {
                    ...authHeader(),
                    ...(options.headers || {})
                },
                ...options
            });

            let data = {};
            try {
                data = await res.json();
            } catch (_) {
                data = {};
            }

            if (!res.ok) {
                const message = data.error || data.message || 'Error en la solicitud';
                throw new Error(message);
            }

            return data;
        }

        async function loadProductos() {
            const data = await fetchJson('/api/productos/admin/todos');
            const productos = data.productos || [];
            const activos = productos.filter((producto) => producto.activo);
            const inactivos = productos.filter((producto) => !producto.activo);

            if (!activos.length) {
                tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No hay productos activos</td></tr>';
            } else {
                tableBody.innerHTML = activos.map((producto) => `
                    <tr>
                        <td>${producto.id}</td>
                        <td>${producto.nombre}</td>
                        <td>${producto.categoria || 'General'}</td>
                        <td>$${formatCurrency(producto.precio)}</td>
                        <td><strong>${producto.stock}</strong></td>
                        <td style="max-width:140px;">
                            <input type="number" min="1" class="form-control form-control-sm" id="add-${producto.id}" value="1">
                        </td>
                        <td>
                            <div class="d-flex flex-column flex-md-row gap-2 action-buttons">
                                <button class="btn btn-sm btn-primary" onclick="agregarStock(${producto.id})">Agregar</button>
                                <button class="btn btn-sm btn-outline-danger" onclick="desactivarProducto(${producto.id})">Desactivar</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            }

            if (!inactivos.length) {
                inactiveTableBody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No hay productos inactivos</td></tr>';
            } else {
                inactiveTableBody.innerHTML = inactivos.map((producto) => `
                    <tr>
                        <td>${producto.id}</td>
                        <td>${producto.nombre}</td>
                        <td>${producto.categoria || 'General'}</td>
                        <td>$${formatCurrency(producto.precio)}</td>
                        <td><strong>${producto.stock}</strong></td>
                        <td>
                            <button class="btn btn-sm btn-success" onclick="reactivarProducto(${producto.id})">Reactivar</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function reactivarProducto(productoId) {
            clearStatus();
            const entrada = prompt('¿Cuánto stock deseas agregar para reactivar este producto?', '1');
            if (entrada === null) return;

            const cantidad = Number(entrada);
            if (!Number.isInteger(cantidad) || cantidad <= 0) {
                showStatus('La cantidad para reactivar debe ser un entero mayor que 0', 'warning');
                return;
            }

            try {
                await fetchJson(`/api/productos/${productoId}/reactivar`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cantidad })
                });

                showStatus('Producto reactivado correctamente', 'success');
                await loadProductos();
            } catch (error) {
                showStatus(error.message, 'danger');
            }
        }

        async function desactivarProducto(productoId) {
            clearStatus();
            const confirmar = confirm('¿Seguro que deseas desactivar este producto?');
            if (!confirmar) return;

            try {
                await fetchJson(`/api/productos/${productoId}`, {
                    method: 'DELETE'
                });

                showStatus('Producto desactivado correctamente', 'success');
                await loadProductos();
            } catch (error) {
                showStatus(error.message, 'danger');
            }
        }

        async function crearProducto(event) {
            event.preventDefault();
            clearStatus();

            const nombre = document.getElementById('nuevo-nombre').value.trim();
            const precio = Number(document.getElementById('nuevo-precio').value);
            const stock = Number(document.getElementById('nuevo-stock').value);
            const descripcion = document.getElementById('nuevo-descripcion').value.trim();

            if (!nombre) {
                showStatus('El nombre es obligatorio', 'warning');
                return;
            }

            if (!(precio > 0)) {
                showStatus('El precio debe ser mayor a 0', 'warning');
                return;
            }

            if (!Number.isInteger(stock) || stock < 0) {
                showStatus('El stock debe ser un entero mayor o igual a 0', 'warning');
                return;
            }

            try {
                await fetchJson('/api/productos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nombre,
                        precio,
                        descripcion,
                        stock
                    })
                });

                nuevoProductoForm.reset();
                showStatus('Producto creado correctamente', 'success');
                await loadProductos();
            } catch (error) {
                showStatus(error.message, 'danger');
            }
        }

        async function agregarStock(productoId) {
            clearStatus();
            const input = document.getElementById(`add-${productoId}`);
            const cantidad = Number(input ? input.value : 0);

            if (!Number.isInteger(cantidad) || cantidad <= 0) {
                showStatus('La cantidad debe ser un entero mayor que 0', 'warning');
                return;
            }

            try {
                await fetchJson(`/api/productos/${productoId}/stock`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cantidad })
                });

                showStatus('Stock actualizado correctamente', 'success');
                await loadProductos();
            } catch (error) {
                showStatus(error.message, 'danger');
            }
        }

        window.agregarStock = agregarStock;
        window.desactivarProducto = desactivarProducto;
        window.reactivarProducto = reactivarProducto;
        nuevoProductoForm.addEventListener('submit', crearProducto);

        (async function init() {
            try {
                await loadProductos();
            } catch (error) {
                showStatus(error.message, 'danger');
                tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No se pudo cargar la información</td></tr>';
            }
        })();
    </script>
</body>
</html>
