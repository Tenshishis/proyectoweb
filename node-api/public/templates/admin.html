<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow p-4">
                    <h2 class="mb-4">Panel de Administración</h2>
                    <div id="users-table"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
    async function fetchUsers() {
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        let html = `<table class='table'><thead><tr><th>Nombre</th><th>Usuario</th><th>Email</th><th>Rol</th><th>Acciones</th></tr></thead><tbody>`;
        for (const user of users) {
            html += `<tr><td>${user.nombre}</td><td>${user.username}</td><td>${user.email}</td><td>${user.rol || 'Sin rol'}</td>`;
            html += `<td><button onclick="assignRole('${user._id}','admin')" class='btn btn-sm btn-success me-1'>Admin</button>`;
            html += `<button onclick="assignRole('${user._id}','vendedor')" class='btn btn-sm btn-primary me-1'>Vendedor</button>`;
            html += `<button onclick="assignRole('${user._id}','consultor')" class='btn btn-sm btn-warning me-1'>Consultor</button>`;
            html += `<button onclick="deleteUser('${user._id}')" class='btn btn-sm btn-danger'>Eliminar</button></td></tr>`;
        }
        html += '</tbody></table>';
        document.getElementById('users-table').innerHTML = html;
    }
    async function assignRole(id, role) {
        await fetch(`/api/admin/assign-role/${id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rol: role })
        });
        fetchUsers();
    }
    async function deleteUser(id) {
        await fetch(`/api/admin/delete-user/${id}`, { method: 'DELETE' });
        fetchUsers();
    }
    fetchUsers();
    </script>
</body>
</html>
