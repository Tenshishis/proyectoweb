<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @media (max-width: 576px) {
            .panel-card { padding: 1rem !important; }
            .panel-title { font-size: 1.35rem; }
            .panel-actions .btn { width: 100%; }
        }
    </style>
</head>
<body class="bg-light">
    <div class="container py-3 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-7">
                <div class="card shadow p-4 text-center panel-card">
                    <h2 class="mb-4 panel-title">Bienvenido, Administrador</h2>
                    <div class="d-flex flex-column gap-3 align-items-center panel-actions">
                        <a href="/admin/users" class="btn btn-primary btn-lg">Administrar Usuarios</a>
                        <a href="/admin/productos" class="btn btn-outline-primary btn-lg">Administrar Stock de Productos</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
