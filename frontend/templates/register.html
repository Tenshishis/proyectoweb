<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4 mt-5">
          <div class="card p-4">
            <h3 class="card-title text-center mb-3">Registrarse</h3>
            <form method="POST">
              <div class="mb-3">
                <input name="nombre" placeholder="Nombre" required class="form-control">
              </div>
              <div class="mb-3">
                <input name="username" placeholder="Usuario" required class="form-control">
              </div>
              <div class="mb-3">
                <input name="email" type="email" placeholder="Email" required class="form-control">
              </div>
              <div class="mb-3">
                <input name="password" type="password" placeholder="Contraseña" required class="form-control">
              </div>
              <button class="btn btn-primary w-100 mt-2">Registrarse</button>
            </form>
            <div class="mt-2 text-center">
              <a href="/login">Ya tengo cuenta</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
