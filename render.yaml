services:
  - type: web
    name: proyectoweb
    env: node
    plan: free
    buildCommand: npm install --prefix node-api
    startCommand: npm start --prefix node-api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PGHOST
        sync: false
      - key: PGPORT
        sync: false
      - key: PGDATABASE
        sync: false
      - key: PGUSER
        sync: false
      - key: PGPASSWORD
        sync: false
      - key: PGSSLMODE
        value: require
      - key: JWT_SECRET
        sync: false
