services:
  - type: web
    name: proyectoweb
    env: node
    plan: free
    buildCommand: npm install --prefix node-api
    startCommand: npm start --prefix node-api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
