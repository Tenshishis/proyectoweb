services:
  - type: web
    name: proyectoweb-backend
    runtime: node
    plan: free
    buildCommand: "cd node-api && npm install"
    startCommand: "cd node-api && npm start"
    envVars:
      - key: PORT
        value: 4000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: proyectoweb-frontend
    runtime: python
    plan: free
    buildCommand: "cd frontend && pip install -r requirements.txt"
    startCommand: "cd frontend && gunicorn app:app"
    envVars:
      - key: API_BASE
        value: https://proyectoweb-backend.onrender.com/api
